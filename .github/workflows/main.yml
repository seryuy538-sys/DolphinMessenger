name: Build Flet App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: |
          flet build apk --name "Dolphin" --icon icon.png
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Dolphin-APK
          path: build/apk/bundle/app-release.apk
